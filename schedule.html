<div class="page-intro">
    <h1>Train Schedules</h1>
    <h2>Find active routes and times</h2>

    <div class="sched-wrap" style="width: 100%; margin-top: 2rem; max-width: 1200px; padding: 0 1.5rem;">

        <div class="filter-bar" style="background-color: var(--white_colour); padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 12px rgba(15, 41, 66, 0.04); margin-bottom: 2rem; width: 100%;">
            <div class="search-grid">
                <div class="field-group">
                    <label for="origin-select">Origin Station</label>
                    <select id="origin-select"><option value="ALL">All Origins</option></select>
                </div>
                <div class="field-group">
                    <label for="dest-select">Destination Station</label>
                    <select id="dest-select"><option value="ALL">All Destinations</option></select>
                </div>
                <button id="reset-filters-btn" class="btn-primary" style="padding: 0.6rem 1.2rem; cursor: pointer;">Clear Filters</button>
            </div>
        </div>

        <div class="table-card" style="background-color: var(--white_colour); border-radius: 12px; padding: 1.5rem 2rem; box-shadow: 0 4px 12px rgba(15, 41, 66, 0.04); width: 100%; overflow-x: auto; margin-bottom: 50px;">
            <table class="sched-table" id="schedule-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                <tr style="background-color: var(--blue_colour); color: white;">
                    <th style="padding: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Origin</th>
                    <th style="padding: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Destination</th>
                    <th style="padding: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Date</th>
                    <th style="padding: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Departure Time</th>
                    <th style="padding: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td colspan="5" class="no-records" style="text-align: center; padding: 2rem; color: var(--grey_colour); font-style: italic;">Loading schedules...</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
