<!DOCTYPE html>
<html lang="en">
<head>
    <title>RailExpress - Template</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="index.css">
    
</head>
<body>
<!-- navigation bar -->
 
<ul class="topnav">
    <li><a href="home.html">Home</a></li>
    <li><a href="journey.html">Journey</a></li>
    <li class="active"><a href="booking.html">Booking</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="contact.html">Contact Us</a></li>
    <li><a href="help.html">Help</a></li>
</ul>

<div class="head-title">
    <h1 style="color:#FDFCE0;">Welcome!</h1>
    <h2 style="color:#FDFCE0;">Select a journey and Reserve your seat</h2>
</div>

<!-- booking form -->

<div class="form-section">
    <div class="form-sub">
        <h2 style="font-size: 22px;font-weight: 700;color: #ffffff; margin-bottom: 30px;text-align: center;letter-spacing: 0.3px;">Book Your Train Ticket</h2>

        <form id="bookingForm" onsubmit="booking(event)">

            <div>
                <div class="form-group">
                    <label for="start">From</label>
                    <select id="start" onchange="pricecal()" required>
                        <option value="">Departure</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Kandy">Kandy</option>
                        <option value="Galle">Galle</option>
                        <option value="Jaffna">Jaffna</option>
                        <option value="Trincomalee">Trincomalee</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="end">To</label>
                    <select id="end" onchange="pricecal()" required>
                        <option value="">Destination</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Kandy">Kandy</option>
                        <option value="Galle">Galle</option>
                        <option value="Jaffna">Jaffna</option>
                        <option value="Trincomalee">Trincomalee</option>
                    </select>
                </div>
            </div>

            <div>
                <div>
                <div class="form-group">
                    <label for="time">Select Time</label>
                    <select id="time" required> 
                        <option value="">Time of Departure</option>
                        <option value="08:00 AM">08:00 AM</option>
                        <option value="12:30 PM">12:30 PM</option>
                        <option value="04:45 PM">04:45 PM</option>
                        <option value="09:00 PM">09:00 PM</option>
                    </select>
                </div>
            </div>
                
            </div>

            <div class="form-group">
                <label for="date">Date of Journey</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label for="seats">Number of Seats</label>
                <input type="number" id="seats" min="1" value="1" onchange="pricecal()" required>
            </div>

            <div class="form-group">
                <label for="pname">Full Name</label>
                <input type="text" id="pname" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="nic">NIC / Passport Number</label>
                <input type="text" id="nic" placeholder="Enter NIC or Passport" required>
            </div>

            <div class="form-group">
                <label for="cnumber">Mobile Number</label>
                <input type="tel" id="cnumber" placeholder="Enter mobile number" required>
            </div>

            <div class="price-box">
                <h3 id="priceDisplay" style="font-size: 20px;font-weight: 700;color: #162032;">Total Price: Rs.0</h3>
            </div>

            <button type="submit" class="submit-btn">Confirm Booking</button>

        </form>
    </div>
</div>

    

<script src="index.js"></script>



<footer>
    <p>&copy; 2026 RailExpress Booking System. All rights reserved.</p>
</footer>

</body>
</html>
