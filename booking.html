<!DOCTYPE html>
<html lang="en">
<head>
    <title>RailExpress - Book Tickets</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    
</head>
<body style=" background-color: var(--body-bg);
    color: var(--primary-navy);
    line-height: 1.6;
    padding-bottom: 60px;
    background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('images/train.jpg');
    background-size: cover;
    background-attachment: fixed;
    margin: 0;
    padding: 0;">
<!-- navigation bar -->
 
<ul class="topnav">
        <li><a href="index.html">Home</a></li>
        <li><a href="journey.html">Journey Overview</a></li>
        <li><a href="schedule.html">Schedules</a></li>
        <li class="active"><a href="booking.html">Booking</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact Us</a></li>
</ul>

<div class="head-title">
    <h1 style="color:#FDFCE0;">Welcome!</h1>
    <h2 style="color:#FDFCE0;">Select a journey and Reserve your seat</h2>
</div>

<!-- booking form -->

<div class="form-section">
    <div class="form-sub">
        <h2 style="font-size: 22px;font-weight: 700;color: #ffffff; margin-bottom: 30px;text-align: center;letter-spacing: 0.3px;">Book Your Train Ticket</h2>

        <form id="bookingForm" onsubmit="booking(event)">

            <div>
                <div class="form-group">
                    <label for="start">From</label>
                    <select id="start" onchange="pricecal()" required>
                        <option value="">Departure</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Kandy">Kandy</option>
                        <option value="Galle">Galle</option>
                        <option value="Jaffna">Jaffna</option>
                        <option value="Trincomalee">Trincomalee</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="end">To</label>
                    <select id="end" onchange="pricecal()" required>
                        <option value="">Destination</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Kandy">Kandy</option>
                        <option value="Galle">Galle</option>
                        <option value="Jaffna">Jaffna</option>
                        <option value="Trincomalee">Trincomalee</option>
                    </select>
                </div>
            </div>

            <div>
                <div>
                <div class="form-group">
                    <label for="time">Select Time</label>
                    <select id="time" required>
                        <option value="">Time of Departure</option>
                        <option value="05:00 AM">05:00 AM</option>
                        <option value="05:45 AM">05:45 AM</option>
                        <option value="05:55 AM">05:55 AM</option>
                        <option value="06:15 AM">06:15 AM</option>
                        <option value="06:35 AM">06:35 AM</option>
                        <option value="06:55 AM">06:55 AM</option>
                        <option value="07:00 AM">07:00 AM</option>
                        <option value="07:10 AM">07:10 AM</option>
                        <option value="07:30 AM">07:30 AM</option>
                        <option value="08:15 AM">08:15 AM</option>
                        <option value="08:30 AM">08:30 AM</option>
                        <option value="09:30 AM">09:30 AM</option>
                        <option value="09:45 AM">09:45 AM</option>
                        <option value="10:30 AM">10:30 AM</option>
                        <option value="11:15 AM">11:15 AM</option>
                        <option value="11:50 AM">11:50 AM</option>
                        
                        <option value="01:20 PM">01:20 PM</option>
                        <option value="01:55 PM">01:55 PM</option>
                        <option value="02:45 PM">02:45 PM</option>
                        <option value="03:30 PM">03:30 PM</option>
                        <option value="04:15 PM">04:15 PM</option>
                        <option value="04:30 PM">04:30 PM</option>
                        <option value="05:00 PM">05:00 PM</option>
                        <option value="05:30 PM">05:30 PM</option>
                        <option value="05:45 PM">05:45 PM</option>
                        <option value="06:15 PM">06:15 PM</option>
                        <option value="06:20 PM">06:20 PM</option>
                        <option value="07:15 PM">07:15 PM</option>
                        <option value="07:30 PM">07:30 PM</option>
                        <option value="08:15 PM">08:15 PM</option>
                        <option value="09:30 PM">09:30 PM</option>
                    </select>
                </div>
            </div>
                
            </div>

            <div class="form-group">
                <label for="date">Date of Journey</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label for="seats">Number of Seats</label>
                <input type="number" id="seats" min="1" value="1" onchange="pricecal()" required>
            </div>

            <div class="form-group">
                <label for="pname">Full Name</label>
                <input type="text" id="pname" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="nic">NIC / Passport Number</label>
                <input type="text" id="nic" placeholder="Enter NIC or Passport" required>
            </div>

            <div class="form-group">
                <label for="cnumber">Mobile Number</label>
                <input type="tel" id="cnumber" placeholder="Enter mobile number" required>
            </div>

            <div class="price-box">
                <h3 id="priceDisplay" style="font-size: 20px;font-weight: 700;color: #162032;">Total Price: Rs.0</h3>
            </div>

            <button type="submit" class="submit-btn">Confirm Booking</button>

        </form>
    </div>
</div>

    

<script src="js/script.js"></script>



<footer>
    <p>&copy; 2026 RailExpress Booking System. All rights reserved.</p>
</footer>

</body>
</html>
